name: Code2Docs Update

# Automatic post-merge documentation update. On every PR merged into main, the
# living docs, Confluence drafts and release digest refresh — scoped to the diff —
# get re-published to GitHub Pages, and land as a REVIEW PR. Nothing is pushed to
# main directly.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:        # re-demo the update path without a real PR
    inputs:
      base_sha:
        description: "Base SHA to diff from (optional; defaults to HEAD~1)"
        required: false

# NOTE: merge_commit_sha is null for squash/rebase merges. This setup diffs
# base.sha..merge_commit_sha, so configure the repo to ALLOW MERGE COMMITS
# (Settings -> General -> Pull Requests). For a squash-only repo, switch the
# trigger to `push: branches: [main]` and diff before..after instead.

jobs:
  build:
    # Run for a manual dispatch, or a real merge — but NOT when one of our own
    # code2docs/* review PRs merges (that would loop).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.head.ref, 'code2docs/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve module + base/head SHAs
        id: vars
        run: |
          MODULE=$(python3 -c "import json;print(json.load(open('code2docs/config.json'))['module_root'])")
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.merge_commit_sha }}"
            PR="${{ github.event.pull_request.number }}"
          else
            BASE="${{ github.event.inputs.base_sha }}"
            HEAD="${{ github.sha }}"
            PR="manual"
          fi
          [ -z "$HEAD" ] && HEAD="${{ github.sha }}"
          [ -z "$BASE" ] && BASE=$(git rev-parse "${HEAD}^" 2>/dev/null || git rev-parse HEAD~1)
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "pr=$PR"     >> "$GITHUB_OUTPUT"
          echo "Module=$MODULE  base=$BASE  head=$HEAD  pr=$PR"

      # 1. Diff — which files did this merge change?
      - name: Changed files
        run: |
          git diff --name-only "${{ steps.vars.outputs.base }}" "${{ steps.vars.outputs.head }}" > changed.txt
          echo "Changed files:"; cat changed.txt

      # Snapshot the OLD context layer BEFORE we update it, for the edge diff.
      - name: Snapshot base graph
        run: |
          if git cat-file -e "${{ steps.vars.outputs.base }}:graphify-out/graph.json" 2>/dev/null; then
            git show "${{ steps.vars.outputs.base }}:graphify-out/graph.json" > base-graph.json
            echo "base graph captured"
          else
            echo "no base graph (run Code2Docs Setup first) — edge deltas will be empty"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install graphify
        run: pip install graphifyy

      # 2. Update the CONTEXT LAYER, then copy the module graph up to the canonical
      #    top-level graphify-out/graph.json that config.json + map_impact.py read.
      - name: Update code graph
        run: |
          graphify update "${{ steps.vars.outputs.module }}"
          MOD_OUT="${{ steps.vars.outputs.module }}/graphify-out"
          if [ -f "$MOD_OUT/graph.json" ]; then
            cp "$MOD_OUT/graph.json" graphify-out/graph.json
            echo "copied refreshed graph -> graphify-out/graph.json"
          else
            echo "::warning::graphify update produced no $MOD_OUT/graph.json; keeping committed graph"
          fi
          # Keep graphify's own community labels alongside the graph.
          if [ -f "$MOD_OUT/.graphify_labels.json" ]; then
            cp "$MOD_OUT/.graphify_labels.json" graphify-out/.graphify_labels.json
            echo "copied community labels -> graphify-out/.graphify_labels.json"
          fi

      # 3. Map diff -> impacted flows + edge deltas, and apply the highlight plan
      #    (new/changed steps) to flows.json so the docs render the change.
      - name: Map impact
        run: |
          BASE_ARG=""
          [ -f base-graph.json ] && BASE_ARG="--base-graph base-graph.json"
          python code2docs/map_impact.py changed.txt $BASE_ARG --apply-flows

      # 4. Re-narrate impacted flows (drift-aware agent) — best effort. The
      #    deterministic highlights above already stand on their own; this only
      #    improves the prose, so a missing key or agent error never blocks docs.
      - name: Re-narrate impacted flows
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat code2docs/redraft_prompt.md)" \
            --permission-mode acceptEdits --output-format text || true

      # 5. Re-render all three surfaces for the impacted flows
      - name: Render interactive living docs
        run: python code2docs/render_interactive.py --only code2docs/impacted.json

      - name: Render release digest
        run: python code2docs/render_release_digest.py changed.txt --pr "${{ steps.vars.outputs.pr }}"

      - name: Sync impacted Confluence pages (draft/preview)
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: python code2docs/confluence_sync.py --only code2docs/impacted.json

      # 6. Package the living docs for GitHub Pages + an offline artifact copy.
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/interactive
      - name: Upload living-docs artifact (offline copy)
        uses: actions/upload-artifact@v4
        with:
          name: docuvault-living-docs
          path: docs/interactive

      # 7. Review gate: open a docs PR (never push to main)
      - name: Open docs review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: code2docs/pr-${{ steps.vars.outputs.pr }}
          title: "docs: Code2Docs update for #${{ steps.vars.outputs.pr }}"
          commit-message: "docs: Code2Docs update for #${{ steps.vars.outputs.pr }}"
          body: |
            Auto-generated by **Code2Docs** from the code graph. Scoped to the merge diff.

            - Impacted flows re-rendered as interactive living docs (`docs/interactive/`) and re-published to GitHub Pages
            - Release digest updated (`docs/RELEASE_NOTES.md`)
            - Confluence pages synced as drafts (label `code2docs-review`)

            Review the highlighted (new/changed) steps before merging.
          labels: code2docs, documentation
          add-paths: |
            graphify-out/**
            code2docs/flows.json
            code2docs/.confluence_map.json
            docs/interactive/**
            docs/RELEASE_NOTES.md

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
